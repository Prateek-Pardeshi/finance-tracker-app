<li class="py-4 flex items-center justify-between space-x-4">
    <div class="flex items-center space-x-4">
            <span class="p-2 rounded-full" [ngClass]="[iconBgColor, amountColor]"
                [iconName]="isIncome ? 'arrow-up-icon' : 'arrow-down-icon'" appIconInjector>
            </span>
            <div>
                <p class="text-sm font-medium text-gray-900 dark:text-white truncate">{{ transaction.description }}</p>
                <p class="text-sm text-gray-500 dark:text-gray-400">{{ transaction.category }} &bull; {{
                    transaction.date
                    }}</p>
            </div>
        </div>
    <div class="flex items-center justify-between space-x-4">        
        <p class="text-sm font-semibold" [ngClass]="amountColor">
            {{ isIncome ? '+' : '-' }}
            {{ transaction.amount | currency:'INR' }}
        </p>
        @if(allowDelete) {
        <!-- <div class="flex items-center"> -->
            <span class="text-red-500 hover:text-red-700" [iconName]="'transaction-delete-icon'" appIconInjector (click)="deleteTransaction(transaction)"></span>
        <!-- </div> -->
        }
    </div>
    
</li>
